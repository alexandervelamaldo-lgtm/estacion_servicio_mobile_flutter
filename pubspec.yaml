name: estacion_servicio_mobile_flutter
description: App móvil Flutter para SurtidorBolivia conectada al backend Django existente.
publish_to: none

version: 1.0.0-beta.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  speech_to_text: ^7.0.0
  share_plus: ^10.1.4
  pdf: ^3.11.2
  excel: ^4.0.6
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
